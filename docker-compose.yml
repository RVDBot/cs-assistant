services:
  cs-assistant:
    image: ghcr.io/rvdbot/cs-assistant:latest
    pull_policy: always
    volumes:
      - cs_data:/app/data
      - cs_knowledge:/app/knowledge
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/cs-assistant.db
      - BASE_URL=https://cs.speedropeshop.com
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - cs-assistant

volumes:
  cs_data:
  cs_knowledge:
  caddy_data:
  caddy_config:
