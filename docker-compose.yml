services:
  cs-assistant:
    image: ghcr.io/rvdbot/cs-assistant:latest
    pull_policy: always
    ports:
      - "3010:3000"
    volumes:
      - cs_data:/app/data
      - cs_knowledge:/app/knowledge
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/cs-assistant.db
    restart: unless-stopped

volumes:
  cs_data:
  cs_knowledge:
