services:
  cs-assistant:
    image: ghcr.io/rvdbot/cs-assistant:latest
    pull_policy: always
    volumes:
      - cs_data:/app/data
      - cs_knowledge:/app/knowledge
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/cs-assistant.db
      - BASE_URL=${BASE_URL}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - WC_STORE_URL=${WC_STORE_URL}
      - WC_CONSUMER_KEY=${WC_CONSUMER_KEY}
      - WC_CONSUMER_SECRET=${WC_CONSUMER_SECRET}
    restart: unless-stopped
    depends_on:
      - protonmail-bridge

  protonmail-bridge:
    image: shenxn/protonmail-bridge:latest
    volumes:
      - protonmail_data:/root
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - cs-assistant

volumes:
  cs_data:
  cs_knowledge:
  caddy_data:
  caddy_config:
  protonmail_data:
